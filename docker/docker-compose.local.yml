# Local run: postgres + collection-manager + mcp-server + ngrok
# Images built via: ./gradlew runLocal (or jibDockerBuild)
# Requires NGROK_AUTHTOKEN (set env or create .env from .env.example)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wizard_stat_db
      POSTGRES_USER: wizard_user
      POSTGRES_PASSWORD: wizard_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wizard_user -d collection_manager_db"]
      interval: 2s
      timeout: 5s
      retries: 10

  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:latest}
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_local_data:/qdrant/storage

  collection-manager:
    image: mtg-bro/collection-manager:latest
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/collection_manager_db
      SPRING_DATASOURCE_USERNAME: wizard_user
      SPRING_DATASOURCE_PASSWORD: wizard_pass
      AUTH_ISSUER_URI: http://auth-service:8080
    ports:
      - "8080:8080"

  draftsim-parser:
    image: mtg-bro/draftsim-parser:latest
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      auth-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/draftsim_parser_db
      SPRING_DATASOURCE_USERNAME: wizard_user
      SPRING_DATASOURCE_PASSWORD: wizard_pass
      AUTH_ISSUER_URI: http://auth-service:8080
      LLM_CLIENT: ${LLM_CLIENT:-MOCK}
      AI_CHAT_PROVIDER: ${AI_CHAT_PROVIDER:-none}
      AI_EMBEDDING_PROVIDER: ${AI_EMBEDDING_PROVIDER:-none}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ARTICLE_VECTOR_INDEX_ENABLED: ${ARTICLE_VECTOR_INDEX_ENABLED:-false}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      QDRANT_INITIALIZE_SCHEMA: ${QDRANT_INITIALIZE_SCHEMA:-true}
    ports:
      - "8081:8080"

  wizard-stat-aggregator:
    image: mtg-bro/wizard-stat-aggregator:latest
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wizard_stat_db
      SPRING_DATASOURCE_USERNAME: wizard_user
      SPRING_DATASOURCE_PASSWORD: wizard_pass
      AUTH_ISSUER_URI: http://auth-service:8080
      SCHEDULER_CARD_LIMITED_STATS_ENABLED: "false"
    ports:
      - "8082:8080"

  mcp-server:
    image: mtg-bro/mcp-server:latest
    depends_on:
      - collection-manager
      - draftsim-parser
    environment:
      COLLECTION_MANAGER_BASE_URL: http://collection-manager:8080
      DRAFTSIM_PARSER_BASE_URL: http://draftsim-parser:8080
      # AUTH_ISSUER_URI / MCP_BASE_URL not set → OAuth disabled for local dev.
      # To enable, expose auth-service via a second ngrok tunnel and set both vars.
    ports:
      - "3000:3000"
    command: ["--transport", "http", "--port", "3000"]

  auth-service:
    image: mtg-bro/auth-service:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_service_db
      SPRING_DATASOURCE_USERNAME: wizard_user
      SPRING_DATASOURCE_PASSWORD: wizard_pass
      AUTH_ISSUER_URI: http://auth-service:8080
      MCP_CLIENT_REDIRECT_URI: http://localhost:3000/oauth2/callback
      AUTH_REFRESH_COOKIE_SECURE: "false"
    ports:
      - "8083:8080"

  ngrok:
    image: ngrok/ngrok:latest
    depends_on:
      - mcp-server
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: ["http", "mcp-server:3000"]
    ports:
      - "4040:4040"

volumes:
  postgres_local_data:
  qdrant_local_data:
