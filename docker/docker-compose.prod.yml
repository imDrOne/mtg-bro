# Production compose. Module env vars are managed in per-module .env files written by CI.
# Postgres is expected to be already running and connected to mtg-bro-net.

services:
  collection-manager:
    container_name: collection-manager
    image: ghcr.io/${GHCR_OWNER}/mtg-bro/collection-manager:latest
    restart: unless-stopped
    env_file: [.collection-manager.env]
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - mtg-bro-net

  draftsim-parser:
    container_name: draftsim-parser
    image: ghcr.io/${GHCR_OWNER}/mtg-bro/draftsim-parser:latest
    restart: unless-stopped
    env_file: [.draftsim-parser.env]
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      - qdrant
    networks:
      - mtg-bro-net

  qdrant:
    container_name: qdrant
    image: ${QDRANT_IMAGE:-qdrant/qdrant:latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - mtg-bro-net

  wizard-stat-aggregator:
    container_name: wizard-stat-aggregator
    image: ghcr.io/${GHCR_OWNER}/mtg-bro/wizard-stat-aggregator:latest
    restart: unless-stopped
    env_file: [.wizard-stat-aggregator.env]
    ports:
      - "127.0.0.1:8082:8080"
    networks:
      - mtg-bro-net

  auth-service:
    container_name: auth-service
    image: ghcr.io/${GHCR_OWNER}/mtg-bro/auth-service:latest
    restart: unless-stopped
    env_file: [.auth-service.env]
    ports:
      - "127.0.0.1:8083:8080"
    networks:
      - mtg-bro-net

  mcp-server:
    container_name: mcp-server
    image: ghcr.io/${GHCR_OWNER}/mtg-bro/mcp-server:latest
    restart: unless-stopped
    env_file: [.mcp-server.env]
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - collection-manager
      - draftsim-parser
    networks:
      - mtg-bro-net

  caddy:
    container_name: caddy
    build: ./caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    env_file: [.infra.env]
    depends_on:
      - mcp-server
      - auth-service
    networks:
      - mtg-bro-net

  # Optional: keeps DuckDNS record pointing to this server's IP.
  # SUBDOMAINS and TOKEN are mapped from DUCKDNS_* vars sourced from .infra.env by the deploy script.
  duckdns:
    container_name: duckdns
    image: linuxserver/duckdns:latest
    restart: unless-stopped
    environment:
      SUBDOMAINS: ${DUCKDNS_SUBDOMAINS:-}
      TOKEN: ${DUCKDNS_TOKEN:-}

networks:
  mtg-bro-net:
    external: true

volumes:
  caddy_data:
  caddy_config:
  qdrant_data:
