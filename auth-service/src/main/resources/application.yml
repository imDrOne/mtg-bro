spring:
  application:
    name: auth-service
  profiles:
    default: local
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

server:
  port: 8080

auth:
  issuer-uri: ${AUTH_ISSUER_URI}
  mcp-client:
    redirect-uri: ${MCP_CLIENT_REDIRECT_URI}
  trusted-proxy-cidr: ${AUTH_TRUSTED_PROXY_CIDR:172.16.0.0/12}
