spring:
  application:
    name: draftsim-parser
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_ISSUER_URI:http://localhost:8083}
  profiles:
    default: local
  exposed:
    generate-ddl: false
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

infrastructure:
  http:
    client:
      draftsim:
        base-url: ${DRAFTSIM_BASE_URL:https://draftsim.com}
  llm:
    client: ${LLM_CLIENT:CLAUDE}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
  analysis:
    auto-publish: ${ANALYSIS_AUTO_PUBLISH:false}
