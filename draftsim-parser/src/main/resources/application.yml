spring:
  application:
    name: draftsim-parser
  ai:
    model:
      chat: ${AI_CHAT_PROVIDER:anthropic}
      embedding: ${AI_EMBEDDING_PROVIDER:openai}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: ${AI_CHAT_MODEL:claude-haiku-4-5-20251001}
          max-tokens: ${AI_CHAT_MAX_TOKENS:1024}
    openai:
      api-key: ${OPENAI_API_KEY:}
      embedding:
        options:
          model: ${AI_EMBEDDING_MODEL:text-embedding-3-small}
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:localhost}
        port: ${QDRANT_PORT:6334}
        api-key: ${QDRANT_API_KEY:}
        collection-name: ${QDRANT_COLLECTION:draftsim_article_insights}
        use-tls: ${QDRANT_USE_TLS:false}
        initialize-schema: ${QDRANT_INITIALIZE_SCHEMA:false}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_ISSUER_URI:http://localhost:8083}
  profiles:
    default: local
  exposed:
    generate-ddl: false
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

infrastructure:
  http:
    client:
      draftsim:
        base-url: ${DRAFTSIM_BASE_URL:https://draftsim.com}
      telegram:
        base-url: ${TELEGRAM_BASE_URL:https://api.telegram.org}
  llm:
    client: ${LLM_CLIENT:SPRING_AI}
  analysis:
    auto-publish: ${ANALYSIS_AUTO_PUBLISH:false}
  vector-index:
    enabled: ${ARTICLE_VECTOR_INDEX_ENABLED:true}
    top-k: ${ARTICLE_VECTOR_SEARCH_TOP_K:8}
    similarity-threshold: ${ARTICLE_VECTOR_SEARCH_SIMILARITY_THRESHOLD:0.65}
    search-cache:
      max-size: ${ARTICLE_VECTOR_SEARCH_CACHE_MAX_SIZE:500}
      ttl: ${ARTICLE_VECTOR_SEARCH_CACHE_TTL:PT10M}
  alerts:
    telegram:
      enabled: ${TELEGRAM_ALERTS_ENABLED:false}
      bot-token: ${TELEGRAM_BOT_TOKEN:}
      chat-id: ${TELEGRAM_CHAT_ID:}
