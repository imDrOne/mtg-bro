on:
  workflow_call:
    inputs:
      module:
        required: true
        type: string
      modules_without_migrations:
        required: false
        type: string
        default: 'mcp-server'
      db_name:
        required: false
        type: string
        default: ''
      environment:
        required: false
        type: string
        default: 'production'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Extract version and owner
        id: vars
        run: |
          echo "version=${GITHUB_REF_NAME#${{ inputs.module }}/}" >> $GITHUB_OUTPUT
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image via JIB
        run: |
          ./gradlew :${{ inputs.module }}:jib \
            -x test \
            -Djib.to.image="ghcr.io/${{ steps.vars.outputs.owner }}/mtg-bro/${{ inputs.module }}:${{ steps.vars.outputs.version }}" \
            -Djib.to.tags="latest" \
            -Djib.to.auth.username="${{ github.actor }}" \
            -Djib.to.auth.password="${{ secrets.GITHUB_TOKEN }}"

  build-migrations:
    if: ${{ !contains(format(',{0},', inputs.modules_without_migrations), format(',{0},', inputs.module)) }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: vars
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/migrations/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            CHANGELOG_DIR=${{ inputs.module }}/src/main/resources/db/changelog
          tags: ghcr.io/${{ steps.vars.outputs.owner }}/mtg-bro/${{ inputs.module }}-migrations:latest

  run-migrations:
    needs: [build-migrations, build-and-push]
    if: ${{ !contains(format(',{0},', inputs.modules_without_migrations), format(',{0},', inputs.module)) }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Decode SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

      - name: Write env file to server
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: |
          python3 .github/scripts/write-env.py
          scp -i /tmp/ssh_key -o StrictHostKeyChecking=no \
            /tmp/module.env \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/mtg-bro/docker/.${{ inputs.module }}.env

      - name: Copy Qdrant migration script to server
        if: ${{ inputs.module == 'draftsim-parser' }}
        run: |
          scp -i /tmp/ssh_key -o StrictHostKeyChecking=no \
            scripts/qdrant-migrate.py \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/mtg-bro/docker/qdrant-migrate.py

      - name: Run migrations on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key_path: /tmp/ssh_key
          envs: GHCR_TOKEN,GHCR_OWNER,MODULE,DB_NAME
          script: |
            GHCR_OWNER=$(echo "$GHCR_OWNER" | tr '[:upper:]' '[:lower:]')
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_OWNER" --password-stdin
            set -a; source /opt/mtg-bro/docker/.$MODULE.env; set +a
            docker pull ghcr.io/$GHCR_OWNER/mtg-bro/$MODULE-migrations:latest
            docker run --rm \
              --network mtg-bro-net \
              -e LIQUIBASE_COMMAND_URL="jdbc:postgresql://$DB_HOST:${DB_PORT:-5432}/$DB_NAME" \
              -e LIQUIBASE_COMMAND_USERNAME="$DB_USERNAME" \
              -e LIQUIBASE_COMMAND_PASSWORD="$DB_PASSWORD" \
              ghcr.io/$GHCR_OWNER/mtg-bro/$MODULE-migrations:latest \
              --search-path=/liquibase/changelog \
              --changelog-file=db.changelog-master.yaml \
              update
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_OWNER: ${{ github.repository_owner }}
          MODULE: ${{ inputs.module }}
          DB_NAME: ${{ inputs.db_name }}

      - name: Run Qdrant migrations on server
        if: ${{ inputs.module == 'draftsim-parser' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key_path: /tmp/ssh_key
          envs: MODULE
          script: |
            set -a; source /opt/mtg-bro/docker/.$MODULE.env; set +a
            cd /opt/mtg-bro/docker
            GHCR_OWNER=unused docker compose -f docker-compose.prod.yml up -d qdrant
            QDRANT_URL="${QDRANT_URL:-http://127.0.0.1:6333}" \
            QDRANT_COLLECTION="${QDRANT_COLLECTION:-draftsim_article_insights_v1}" \
            QDRANT_VECTOR_SIZE="${QDRANT_VECTOR_SIZE:-1536}" \
            QDRANT_DISTANCE="${QDRANT_DISTANCE:-Cosine}" \
            AI_EMBEDDING_MODEL="${AI_EMBEDDING_MODEL:-text-embedding-3-small}" \
            QDRANT_API_KEY="${QDRANT_API_KEY:-}" \
            python3 /opt/mtg-bro/docker/qdrant-migrate.py
        env:
          MODULE: ${{ inputs.module }}

  deploy:
    needs: [build-and-push, run-migrations]
    if: |
      always() &&
      needs.build-and-push.result == 'success' &&
      (needs.run-migrations.result == 'success' || needs.run-migrations.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Decode SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

      - name: Write env file to server
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: |
          python3 .github/scripts/write-env.py
          scp -i /tmp/ssh_key -o StrictHostKeyChecking=no \
            /tmp/module.env \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/mtg-bro/docker/.${{ inputs.module }}.env

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key_path: /tmp/ssh_key
          envs: GHCR_TOKEN,GHCR_OWNER,MODULE
          script: |
            GHCR_OWNER=$(echo "$GHCR_OWNER" | tr '[:upper:]' '[:lower:]')
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_OWNER" --password-stdin
            set -a; source /opt/mtg-bro/docker/.$MODULE.env; set +a
            cd /opt/mtg-bro/docker
            docker compose -f docker-compose.prod.yml pull $MODULE
            docker compose -f docker-compose.prod.yml up -d --no-deps $MODULE
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_OWNER: ${{ github.repository_owner }}
          MODULE: ${{ inputs.module }}
