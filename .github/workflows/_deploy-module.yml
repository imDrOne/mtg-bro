on:
  workflow_call:
    inputs:
      module:
        required: true
        type: string
      modules_without_migrations:
        required: false
        type: string
        default: 'mcp-server'
      db_name:
        required: false
        type: string
        default: ''
      environment:
        required: false
        type: string
        default: 'production'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Extract version from tag
        id: vars
        run: echo "version=${GITHUB_REF_NAME#${{ inputs.module }}/}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image via JIB
        run: |
          ./gradlew :${{ inputs.module }}:jib \
            -x test \
            -Djib.to.image="ghcr.io/${{ github.repository_owner }}/mtg-bro/${{ inputs.module }}:${{ steps.vars.outputs.version }}" \
            -Djib.to.tags="latest" \
            -Djib.to.auth.username="${{ github.actor }}" \
            -Djib.to.auth.password="${{ secrets.GITHUB_TOKEN }}"

  build-migrations:
    if: ${{ !contains(format(',{0},', inputs.modules_without_migrations), format(',{0},', inputs.module)) }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/migrations/Dockerfile
          push: true
          build-args: |
            CHANGELOG_DIR=${{ inputs.module }}/src/main/resources/db/changelog
          tags: ghcr.io/${{ github.repository_owner }}/mtg-bro/${{ inputs.module }}-migrations:latest

  run-migrations:
    needs: [build-migrations, build-and-push]
    if: ${{ !contains(format(',{0},', inputs.modules_without_migrations), format(',{0},', inputs.module)) }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Run migrations on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GHCR_OWNER,MODULE,DB_NAME,DB_HOST,DB_PORT,DB_USERNAME,DB_PASSWORD
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_OWNER" --password-stdin
            docker pull ghcr.io/$GHCR_OWNER/mtg-bro/$MODULE-migrations:latest
            docker run --rm \
              --network mtg-bro-net \
              -e LIQUIBASE_COMMAND_URL="jdbc:postgresql://$DB_HOST:${DB_PORT:-5432}/$DB_NAME" \
              -e LIQUIBASE_COMMAND_USERNAME="$DB_USERNAME" \
              -e LIQUIBASE_COMMAND_PASSWORD="$DB_PASSWORD" \
              ghcr.io/$GHCR_OWNER/mtg-bro/$MODULE-migrations:latest \
              update
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_OWNER: ${{ github.repository_owner }}
          MODULE: ${{ inputs.module }}
          DB_NAME: ${{ inputs.db_name }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

  deploy:
    needs: [build-and-push, run-migrations]
    if: |
      always() &&
      needs.build-and-push.result == 'success' &&
      (needs.run-migrations.result == 'success' || needs.run-migrations.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GHCR_OWNER,MODULE,DB_HOST,DB_PORT,DB_USERNAME,DB_PASSWORD,ANTHROPIC_API_KEY,DUCKDNS_TOKEN,MCP_DOMAIN,DUCKDNS_SUBDOMAINS,CADDY_EMAIL
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_OWNER" --password-stdin
            cd /opt/mtg-bro
            docker compose -f docker-compose.prod.yml pull $MODULE
            docker compose -f docker-compose.prod.yml up -d --no-deps $MODULE
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_OWNER: ${{ github.repository_owner }}
          MODULE: ${{ inputs.module }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DUCKDNS_TOKEN: ${{ secrets.DUCKDNS_TOKEN }}
          MCP_DOMAIN: ${{ secrets.MCP_DOMAIN }}
          DUCKDNS_SUBDOMAINS: ${{ secrets.DUCKDNS_SUBDOMAINS }}
          CADDY_EMAIL: ${{ secrets.CADDY_EMAIL }}
