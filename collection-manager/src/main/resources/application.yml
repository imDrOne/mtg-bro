spring:
  application:
    name: collection-manager
  profiles:
    default: local
  cache:
    type: caffeine
    caffeine:
      spec: expireAfterWrite=86400s
    cache-names: creature-types
  exposed:
    generate-ddl: false
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

infrastructure:
  http:
    client:
      scryfall:
        base-url: ${SCRYFALL_BASE_URL:https://api.scryfall.com}
        retry:
          max-attempts: ${HTTP_CLIENT_SCRYFALL_RETRY_MAX_ATTEMPTS:3}
          initial-delay-ms: ${HTTP_CLIENT_SCRYFALL_RETRY_INITIAL_DELAY_MS:100}
          multiplier: ${HTTP_CLIENT_SCRYFALL_RETRY_MULTIPLIER:2.0}
          max-delay-ms: ${HTTP_CLIENT_SCRYFALL_RETRY_MAX_DELAY_MS:2000}
